# ==============================
# 服务基础配置
# ==============================
# 后端服务端口
server.port=8080

# 人脸服务基地址（通常是本地 Python 服务，例如 http://localhost:8000）
# 后端会调用 {face.base}/embed 完成人脸特征提取
face.base=http://localhost:8000


# ==============================
# 数据源配置（MySQL）
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/proctor?useUnicode=true&connectionTimeZone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.hikari.maximum-pool-size=15


# ==============================
# Jackson
# ==============================
# JSON 序列化时忽略 null 字段
spring.jackson.default-property-inclusion=non_null


# ==============================
# MyBatis-Plus
# ==============================
# 下划线字段自动映射到驼峰属性（如 created_at -> createdAt）
mybatis-plus.configuration.map-underscore-to-camel-case=true
# 关闭二级缓存
mybatis-plus.configuration.cache-enabled=false
# 在控制台输出 SQL（开发排查用）
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl


# ==============================
# JWT 配置
# ==============================
# JWT 签名密钥（生产环境请使用环境变量或密钥管理，不要明文提交）
security.jwt.secret=adzHb7vZMwNXOaAp40m/OgLxTu+ARkxTpFkUL2WWhx0=
# Token 有效期（分钟）：4320 = 3 天
security.jwt.expMinutes=4320


