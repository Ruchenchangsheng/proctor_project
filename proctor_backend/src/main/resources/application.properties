# 邮件调试日志（仅建议开发环境开启）
spring.mail.properties.mail.debug=true
logging.level.org.springframework.mail=DEBUG
logging.level.org.eclipse.angus.mail=DEBUG


# ==============================
# 跨域配置（CORS）
# ==============================
# 允许的前端来源（多个用逗号分隔）
app.cors.allowed-origins=http://localhost:5173
# 示例：
# app.cors.allowed-origins=https://admin.example.com,https://app.example.com


# ==============================
# 日志级别（开发排查）
# ==============================
logging.level.com.example.proctor=DEBUG
logging.level.com.kovr=DEBUG
logging.level.com.baomidou.mybatisplus=DEBUG
logging.level.org.springframework.jdbc.core=DEBUG


# ==============================
# 文件上传限制
# ==============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# ==============================
# 人脸验证阈值
# ==============================
# 1:1 相似度阈值（越高越严格）
app.face.verify.threshold=0.5
# 人脸检测质量阈值（来自 Python 服务 det_score）
app.face.min_det_score=0.50
